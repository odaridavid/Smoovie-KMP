name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Cache Kotlin/Native distribution
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: konan-${{ runner.os }}-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: konan-${{ runner.os }}-

      - name: Lint (ktlint)
        run: ./gradlew :composeApp:ktlintCheck

      - name: Compile Android
        run: ./gradlew :composeApp:compileDebugKotlinAndroid

      - name: Compile iOS (common + iOS targets)
        run: ./gradlew :composeApp:compileKotlinIosSimulatorArm64

      - name: Run unit tests
        run: ./gradlew :composeApp:testDebugUnitTest
