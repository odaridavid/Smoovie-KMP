name: Release to Internal Testing

on:
  workflow_dispatch:
    inputs:
      release_notes:
        description: Release notes for the internal testing track (≤500 chars)
        required: false
        default: Internal testing release.

concurrency:
  group: release-internal
  cancel-in-progress: false

jobs:
  release:
    name: Build and upload AAB
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Compute version
        id: version
        run: |
          VERSION_NAME=$(grep '^versionName=' version.properties | cut -d'=' -f2)
          VERSION_CODE=$((100 + GITHUB_RUN_NUMBER))
          TAG="v${VERSION_NAME}-${VERSION_CODE}"
          echo "name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Computed $TAG (versionName=$VERSION_NAME, versionCode=$VERSION_CODE)"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Cache Kotlin/Native distribution
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: konan-${{ runner.os }}-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: konan-${{ runner.os }}-

      - name: Decode upload keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/upload.keystore"
          echo "RELEASE_STORE_FILE=$RUNNER_TEMP/upload.keystore" >> "$GITHUB_ENV"

      - name: Build signed release bundle
        env:
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: ./gradlew :composeApp:bundleRelease -PversionCodeOverride=${{ steps.version.outputs.code }}

      - name: Write release notes file
        run: |
          mkdir -p whatsnew
          printf '%s' "${{ inputs.release_notes }}" > whatsnew/whatsnew-en-US

      - name: Upload AAB to Play Console internal track
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: dev.odaridavid.smoovie
          releaseFiles: composeApp/build/outputs/bundle/release/composeApp-release.aab
          track: internal
          status: draft
          whatsNewDirectory: whatsnew
          mappingFile: composeApp/build/outputs/mapping/release/mapping.txt

      - name: Tag release and create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.tag }} → Play internal testing"
          git push origin "${{ steps.version.outputs.tag }}"
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --notes "${{ inputs.release_notes }}" \
            --target "${{ github.sha }}"

      - name: Clean up keystore
        if: always()
        run: rm -f "$RUNNER_TEMP/upload.keystore"
