name: Release to Internal Testing

on:
  workflow_dispatch:
    inputs:
      release_notes:
        description: Release notes for the internal testing track (≤500 chars)
        required: false
        default: Internal testing release.

concurrency:
  group: release-internal
  cancel-in-progress: false

jobs:
  release:
    name: Build and upload AAB
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Cache Kotlin/Native distribution
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: konan-${{ runner.os }}-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: konan-${{ runner.os }}-

      - name: Decode upload keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/upload.keystore"
          echo "RELEASE_STORE_FILE=$RUNNER_TEMP/upload.keystore" >> "$GITHUB_ENV"

      - name: Build signed release bundle
        env:
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: ./gradlew :composeApp:bundleRelease -PversionCodeOverride=${{ github.run_number + 100 }}

      - name: Write release notes file
        run: |
          mkdir -p whatsnew
          printf '%s' "${{ inputs.release_notes }}" > whatsnew/whatsnew-en-US

      - name: Upload AAB to Play Console internal track
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: dev.odaridavid.smoovie
          releaseFiles: composeApp/build/outputs/bundle/release/composeApp-release.aab
          track: internal
          status: draft
          whatsNewDirectory: whatsnew
          mappingFile: composeApp/build/outputs/mapping/release/mapping.txt

      - name: Clean up keystore
        if: always()
        run: rm -f "$RUNNER_TEMP/upload.keystore"
