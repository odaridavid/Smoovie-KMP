name: Release (iOS TestFlight)

on:
  workflow_dispatch:
    inputs:
      release_notes:
        description: TestFlight release notes (shown to internal testers)
        required: false
        default: Paste release notes here.

concurrency:
  group: release-ios
  cancel-in-progress: false

jobs:
  release:
    name: Build and upload IPA
    runs-on: macos-14
    permissions:
      contents: write
    env:
      XCODE_VERSION: '16.2'

    steps:
      - uses: actions/checkout@v4

      - name: Compute version
        id: version
        run: |
          VERSION_NAME=$(grep '^versionName=' version.properties | cut -d'=' -f2)
          VERSION_CODE=$((100 + GITHUB_RUN_NUMBER))
          TAG="ios-v${VERSION_NAME}-${VERSION_CODE}"
          echo "name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Computed $TAG (MARKETING_VERSION=$VERSION_NAME, CURRENT_PROJECT_VERSION=$VERSION_CODE)"

      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode_${{ env.XCODE_VERSION }}.app

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Cache Kotlin/Native distribution
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: konan-${{ runner.os }}-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: konan-${{ runner.os }}-

      - name: Import signing certificate
        env:
          IOS_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/signing.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          echo "$IOS_CERTIFICATE_BASE64" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$IOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '" ')

      - name: Install provisioning profile
        env:
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILE_DIR"
          echo "$IOS_PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PROFILE_DIR/Smoovie_Distribution.mobileprovision"

      - name: Write App Store Connect API key
        env:
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$APP_STORE_CONNECT_API_KEY_BASE64" | base64 --decode > ~/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8

      - name: Write release xcconfig overrides
        env:
          IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
          IOS_PROVISIONING_PROFILE_NAME: ${{ secrets.IOS_PROVISIONING_PROFILE_NAME }}
        run: |
          cat > "$RUNNER_TEMP/release.xcconfig" <<EOF
          TEAM_ID = $IOS_TEAM_ID
          PRODUCT_NAME = Smoovie
          PRODUCT_BUNDLE_IDENTIFIER = dev.odaridavid.smoovie
          MARKETING_VERSION = ${{ steps.version.outputs.name }}
          CURRENT_PROJECT_VERSION = ${{ steps.version.outputs.code }}
          DEVELOPMENT_TEAM = $IOS_TEAM_ID
          PROVISIONING_PROFILE_SPECIFIER = $IOS_PROVISIONING_PROFILE_NAME
          CODE_SIGN_IDENTITY = Apple Distribution
          CODE_SIGN_STYLE = Manual
          EOF

      - name: Archive
        env:
          OVERRIDE_KOTLIN_BUILD_IDE_SUPPORTED: 'NO'
        run: |
          xcodebuild archive \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/Smoovie.xcarchive" \
            -xcconfig "$RUNNER_TEMP/release.xcconfig" \
            -allowProvisioningUpdates NO \
            | tee "$RUNNER_TEMP/xcodebuild-archive.log" | xcpretty || (cat "$RUNNER_TEMP/xcodebuild-archive.log" && exit 1)

      - name: Write export options
        env:
          IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
          IOS_PROVISIONING_PROFILE_NAME: ${{ secrets.IOS_PROVISIONING_PROFILE_NAME }}
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>teamID</key>
              <string>$IOS_TEAM_ID</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>dev.odaridavid.smoovie</key>
                  <string>$IOS_PROVISIONING_PROFILE_NAME</string>
              </dict>
              <key>uploadSymbols</key>
              <true/>
              <key>uploadBitcode</key>
              <false/>
          </dict>
          </plist>
          EOF

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/Smoovie.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            | tee "$RUNNER_TEMP/xcodebuild-export.log" | xcpretty || (cat "$RUNNER_TEMP/xcodebuild-export.log" && exit 1)

      - name: Upload to TestFlight
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          IPA_PATH=$(ls "$RUNNER_TEMP/export"/*.ipa | head -1)
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$APP_STORE_CONNECT_API_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID"

      - name: Tag release and create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" -m "iOS Release ${{ steps.version.outputs.tag }} → TestFlight"
          git push origin "${{ steps.version.outputs.tag }}"
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --notes "${{ inputs.release_notes }}" \
            --target "${{ github.sha }}" \
            --prerelease

      - name: Clean up secrets
        if: always()
        run: |
          rm -f "$RUNNER_TEMP/signing.p12"
          rm -rf ~/.appstoreconnect
          security delete-keychain "$RUNNER_TEMP/build.keychain-db" 2>/dev/null || true
          rm -f "$HOME/Library/MobileDevice/Provisioning Profiles/Smoovie_Distribution.mobileprovision"
